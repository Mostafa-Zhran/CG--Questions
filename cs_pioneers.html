<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OS Pioneers — Learn & Play</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff88;
    --amber: #ffb300;
    --red: #ff4444;
    --cyan: #00e5ff;
    --bg: #0a0c0f;
    --bg2: #0f1318;
    --bg3: #141920;
    --border: #1e2d1e;
    --text: #c8ffd4;
    --dim: #4a7a55;
    --glow: 0 0 20px rgba(0,255,136,0.3);
    --glow2: 0 0 40px rgba(0,255,136,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* CRT scanline overlay */
  body::before {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events:none; z-index:9999;
  }

  /* Animated background grid */
  body::after {
    content:'';
    position:fixed; inset:0;
    background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none; z-index:0;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove {
    0%{background-position:0 0}
    100%{background-position:40px 40px}
  }

  .container { max-width:1100px; margin:0 auto; padding:0 20px; position:relative; z-index:1; }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 30px 0 20px;
    text-align: center;
    position: relative;
  }
  .header-tag { color: var(--dim); font-size:12px; letter-spacing:4px; margin-bottom:8px; }
  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    color: var(--green);
    text-shadow: var(--glow), 0 0 80px rgba(0,255,136,0.2);
    letter-spacing: 2px;
    animation: flicker 6s infinite;
  }
  @keyframes flicker {
    0%,94%,96%,100%{opacity:1} 95%{opacity:0.85}
  }
  .header-sub { color: var(--dim); font-size:13px; margin-top:8px; }

  /* NAV TABS */
  .nav-tabs {
    display:flex; gap:4px; justify-content:center;
    padding:20px 0; flex-wrap:wrap;
  }
  .nav-tab {
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--dim); padding:10px 22px; cursor:pointer;
    font-family:'Share Tech Mono',monospace; font-size:13px;
    letter-spacing:1px; transition:all 0.2s;
    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
  }
  .nav-tab:hover { border-color: var(--green); color: var(--green); box-shadow: var(--glow); }
  .nav-tab.active {
    background: rgba(0,255,136,0.08); border-color: var(--green);
    color: var(--green); box-shadow: var(--glow);
  }
  .nav-tab .tab-icon { margin-right:6px; }

  /* SECTIONS */
  .section { display:none; animation: fadeIn 0.3s ease; }
  .section.active { display:block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

  /* SECTION: PROFILES */
  .profiles-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
    gap:16px; padding:20px 0;
  }
  .profile-card {
    background: var(--bg2); border:1px solid var(--border);
    padding:20px; cursor:pointer; transition:all 0.25s;
    position:relative; overflow:hidden;
  }
  .profile-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background: var(--green); transform:scaleY(0); transform-origin:bottom;
    transition:transform 0.25s;
  }
  .profile-card:hover { border-color:var(--green); box-shadow:var(--glow2); transform:translateY(-2px); }
  .profile-card:hover::before { transform:scaleY(1); }
  .profile-name {
    font-family:'Orbitron',monospace; font-size:14px; color:var(--green);
    margin-bottom:6px; letter-spacing:1px;
  }
  .profile-badge {
    display:inline-block; background:rgba(0,255,136,0.1); border:1px solid rgba(0,255,136,0.3);
    color:var(--cyan); font-size:11px; padding:2px 8px; margin-bottom:10px; letter-spacing:1px;
  }
  .profile-contributions { font-size:12px; color:var(--dim); line-height:1.8; }
  .profile-contributions li { list-style:none; padding-left:14px; position:relative; }
  .profile-contributions li::before { content:'▸'; position:absolute; left:0; color:var(--green); }

  /* Modal */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85);
    z-index:1000; justify-content:center; align-items:center; padding:20px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background: var(--bg2); border:1px solid var(--green); max-width:560px; width:100%;
    padding:30px; box-shadow: 0 0 60px rgba(0,255,136,0.2);
    animation:modalIn 0.3s ease;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:none} }
  .modal-close {
    float:right; background:none; border:1px solid var(--dim); color:var(--dim);
    padding:4px 10px; cursor:pointer; font-family:inherit;
  }
  .modal-close:hover { border-color:var(--red); color:var(--red); }

  /* TIMELINE */
  .timeline { padding:20px 0; }
  .timeline-item {
    display:flex; gap:20px; margin-bottom:30px; position:relative;
    animation: slideIn 0.5s ease both;
  }
  @keyframes slideIn { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:none} }
  .timeline-year {
    font-family:'Orbitron',monospace; font-size:13px; color:var(--amber);
    min-width:60px; padding-top:4px; text-align:right;
  }
  .timeline-line {
    display:flex; flex-direction:column; align-items:center;
  }
  .timeline-dot {
    width:12px; height:12px; border:2px solid var(--green); border-radius:50%;
    background:var(--bg); box-shadow:var(--glow); flex-shrink:0;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%,100%{box-shadow:0 0 6px rgba(0,255,136,0.5)}
    50%{box-shadow:0 0 18px rgba(0,255,136,0.8)}
  }
  .timeline-connector { flex:1; width:2px; background:linear-gradient(var(--border),transparent); }
  .timeline-content { background:var(--bg2); border:1px solid var(--border); padding:14px 18px; flex:1; }
  .timeline-title { color:var(--green); font-size:14px; margin-bottom:4px; }
  .timeline-desc { color:var(--dim); font-size:12px; line-height:1.7; }

  /* QUIZ GAME */
  .quiz-container { max-width:700px; margin:0 auto; padding:20px 0; }
  .quiz-status {
    display:flex; justify-content:space-between; align-items:center;
    background:var(--bg2); border:1px solid var(--border); padding:12px 20px; margin-bottom:20px;
  }
  .quiz-score { font-family:'Orbitron',monospace; color:var(--amber); font-size:18px; }
  .quiz-progress { color:var(--dim); font-size:13px; }
  .quiz-timer { font-family:'VT323',monospace; font-size:28px; color:var(--cyan); }

  .quiz-card {
    background:var(--bg2); border:1px solid var(--border); padding:30px;
    margin-bottom:16px;
  }
  .quiz-q-label { color:var(--dim); font-size:11px; letter-spacing:3px; margin-bottom:12px; }
  .quiz-question { font-size:18px; color:var(--text); line-height:1.6; margin-bottom:24px; }
  .quiz-options { display:grid; gap:10px; }
  .quiz-opt {
    background:var(--bg3); border:1px solid var(--border); padding:14px 18px;
    cursor:pointer; font-family:'Share Tech Mono',monospace; font-size:14px;
    color:var(--dim); text-align:left; transition:all 0.2s; letter-spacing:0.5px;
  }
  .quiz-opt:hover:not(:disabled) { border-color:var(--cyan); color:var(--cyan); background:rgba(0,229,255,0.05); }
  .quiz-opt.correct { border-color:var(--green); color:var(--green); background:rgba(0,255,136,0.1); }
  .quiz-opt.wrong { border-color:var(--red); color:var(--red); background:rgba(255,68,68,0.1); }
  .quiz-opt:disabled { cursor:not-allowed; }
  .quiz-feedback {
    font-size:13px; padding:10px 16px; margin-top:10px;
    border-left:3px solid var(--green); background:rgba(0,255,136,0.05);
  }
  .quiz-feedback.wrong-fb { border-color:var(--red); background:rgba(255,68,68,0.05); color:var(--red); }
  .quiz-btn {
    background:rgba(0,255,136,0.1); border:1px solid var(--green); color:var(--green);
    padding:12px 30px; font-family:'Orbitron',monospace; font-size:13px; cursor:pointer;
    letter-spacing:2px; transition:all 0.2s; margin-top:16px;
  }
  .quiz-btn:hover { background:rgba(0,255,136,0.2); box-shadow:var(--glow); }
  .quiz-result {
    text-align:center; padding:40px 20px;
    background:var(--bg2); border:1px solid var(--green); box-shadow:var(--glow2);
  }
  .result-grade { font-family:'VT323',monospace; font-size:80px; line-height:1; }
  .result-msg { font-family:'Orbitron',monospace; font-size:18px; margin:10px 0; }

  /* MATCHING GAME */
  .match-container { padding:20px 0; }
  .match-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .match-cols { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .match-col-title { color:var(--dim); font-size:11px; letter-spacing:3px; margin-bottom:10px; }
  .match-item {
    background:var(--bg2); border:1px solid var(--border); padding:12px 16px;
    cursor:pointer; font-size:13px; color:var(--dim); margin-bottom:8px; transition:all 0.2s;
    min-height:44px; display:flex; align-items:center;
  }
  .match-item:hover:not(.matched):not(.selected) { border-color:var(--cyan); color:var(--cyan); }
  .match-item.selected { border-color:var(--amber); color:var(--amber); background:rgba(255,179,0,0.08); box-shadow:0 0 15px rgba(255,179,0,0.2); }
  .match-item.matched { border-color:var(--green); color:var(--green); background:rgba(0,255,136,0.08); cursor:default; }
  .match-item.wrong-flash { border-color:var(--red); color:var(--red); animation:wrongShake 0.4s ease; }
  @keyframes wrongShake { 0%,100%{transform:none} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .match-score { font-family:'Orbitron',monospace; color:var(--amber); }

  /* FLASHCARD */
  .flash-container { max-width:600px; margin:0 auto; padding:20px 0; }
  .flashcard-wrap { perspective:1000px; height:260px; margin-bottom:20px; cursor:pointer; }
  .flashcard {
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d; transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .flashcard.flipped { transform:rotateY(180deg); }
  .card-face {
    position:absolute; inset:0; backface-visibility:hidden;
    background:var(--bg2); border:1px solid var(--border);
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    padding:30px; text-align:center;
  }
  .card-back { transform:rotateY(180deg); border-color:var(--green); background:rgba(0,255,136,0.03); }
  .card-label { color:var(--dim); font-size:11px; letter-spacing:3px; margin-bottom:16px; }
  .card-content { font-size:20px; color:var(--text); line-height:1.5; }
  .card-back .card-content { font-size:15px; color:var(--green); }
  .card-hint { color:var(--dim); font-size:12px; margin-top:20px; animation:blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .flash-nav { display:flex; gap:10px; justify-content:center; align-items:center; }
  .flash-nav-btn {
    background:var(--bg2); border:1px solid var(--border); color:var(--dim);
    padding:10px 20px; cursor:pointer; font-family:'Share Tech Mono',monospace;
    font-size:14px; transition:all 0.2s;
  }
  .flash-nav-btn:hover { border-color:var(--green); color:var(--green); }
  .flash-counter { font-family:'Orbitron',monospace; color:var(--amber); font-size:14px; }
  .flash-progress {
    height:3px; background:var(--border); margin-bottom:20px; border-radius:2px;
  }
  .flash-progress-bar {
    height:100%; background:var(--green); border-radius:2px; transition:width 0.4s;
    box-shadow: 0 0 8px rgba(0,255,136,0.5);
  }

  /* SCRAMBLE GAME */
  .scramble-container { max-width:600px; margin:0 auto; padding:20px 0; }
  .scramble-clue {
    background:var(--bg2); border:1px solid var(--border); padding:20px;
    margin-bottom:20px; color:var(--dim); font-size:13px; line-height:1.8;
  }
  .scramble-clue strong { color:var(--cyan); }
  .scramble-letters { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:24px; justify-content:center; }
  .letter-tile {
    background:var(--bg3); border:2px solid var(--border); width:44px; height:50px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Orbitron',monospace; font-size:20px; color:var(--text);
    cursor:pointer; transition:all 0.15s; user-select:none;
  }
  .letter-tile:hover:not(.used) { border-color:var(--amber); color:var(--amber); transform:translateY(-4px); box-shadow:0 4px 12px rgba(255,179,0,0.3); }
  .letter-tile.used { opacity:0.3; cursor:default; transform:none; }
  .answer-slots { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; justify-content:center; }
  .answer-slot {
    width:44px; height:50px; border-bottom:2px solid var(--green);
    display:flex; align-items:center; justify-content:center;
    font-family:'Orbitron',monospace; font-size:20px; color:var(--green);
    cursor:pointer; transition:all 0.15s;
  }
  .answer-slot:hover:not(:empty) { color:var(--red); }
  .scramble-result { font-size:14px; padding:10px; text-align:center; min-height:30px; }

  /* Responsive */
  @media(max-width:600px) {
    .match-cols { grid-template-columns:1fr; }
    .profiles-grid { grid-template-columns:1fr; }
  }

  /* Typing cursor */
  .typed::after { content:'_'; animation:blink 1s infinite; }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--dim); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-tag">// OPERATING SYSTEMS HISTORY //</div>
    <h1>OS PIONEERS</h1>
    <div class="header-sub">Interactive Learning Terminal — v1.0.0</div>
  </header>

  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="showSection('profiles')"><span class="tab-icon">◈</span>PROFILES</button>
    <button class="nav-tab" onclick="showSection('timeline')"><span class="tab-icon">◈</span>TIMELINE</button>
    <button class="nav-tab" onclick="showSection('flashcards')"><span class="tab-icon">◈</span>FLASHCARDS</button>
    <button class="nav-tab" onclick="showSection('quiz')"><span class="tab-icon">◈</span>QUIZ</button>
    <button class="nav-tab" onclick="showSection('match')"><span class="tab-icon">◈</span>MATCH GAME</button>
    <button class="nav-tab" onclick="showSection('scramble')"><span class="tab-icon">◈</span>UNSCRAMBLE</button>
  </nav>

  <!-- PROFILES -->
  <section id="profiles" class="section active">
    <div class="profiles-grid" id="profilesGrid"></div>
  </section>

  <!-- TIMELINE -->
  <section id="timeline" class="section">
    <div class="timeline" id="timelineContainer"></div>
  </section>

  <!-- FLASHCARDS -->
  <section id="flashcards" class="section">
    <div class="flash-container">
      <div class="flash-progress"><div class="flash-progress-bar" id="flashProgress"></div></div>
      <div class="flashcard-wrap" onclick="flipCard()">
        <div class="flashcard" id="flashcard">
          <div class="card-face card-front">
            <div class="card-label">SCIENTIST</div>
            <div class="card-content" id="flashFront"></div>
            <div class="card-hint">[ CLICK TO REVEAL ]</div>
          </div>
          <div class="card-face card-back">
            <div class="card-label">CONTRIBUTIONS</div>
            <div class="card-content" id="flashBack"></div>
          </div>
        </div>
      </div>
      <div class="flash-nav">
        <button class="flash-nav-btn" onclick="prevCard()">◂ PREV</button>
        <span class="flash-counter" id="flashCounter">1 / 10</span>
        <button class="flash-nav-btn" onclick="nextCard()">NEXT ▸</button>
      </div>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="section">
    <div class="quiz-container">
      <div class="quiz-status">
        <div>SCORE: <span class="quiz-score" id="quizScore">0</span></div>
        <div class="quiz-progress" id="quizProgress">Question 1/12</div>
        <div>TIME: <span class="quiz-timer" id="quizTimer">20</span></div>
      </div>
      <div id="quizArea"></div>
    </div>
  </section>

  <!-- MATCH GAME -->
  <section id="match" class="section">
    <div class="match-container">
      <div class="match-header">
        <div style="color:var(--text)">Match each scientist to their key contribution</div>
        <div class="match-score">MATCHES: <span id="matchScore">0</span>/8</div>
      </div>
      <button class="quiz-btn" onclick="initMatch()" style="margin-bottom:16px;font-size:11px">⟳ SHUFFLE</button>
      <div class="match-cols">
        <div>
          <div class="match-col-title">SCIENTIST</div>
          <div id="matchLeft"></div>
        </div>
        <div>
          <div class="match-col-title">CONTRIBUTION</div>
          <div id="matchRight"></div>
        </div>
      </div>
      <div id="matchMsg" style="text-align:center;margin-top:20px;font-size:14px;min-height:24px;color:var(--green)"></div>
    </div>
  </section>

  <!-- SCRAMBLE -->
  <section id="scramble" class="section">
    <div class="scramble-container">
      <div class="match-header">
        <div style="color:var(--text)">Unscramble the scientist's name</div>
        <div class="match-score">SCORE: <span id="scrambleScore">0</span></div>
      </div>
      <div class="scramble-clue" id="scrambleClue"></div>
      <div class="answer-slots" id="answerSlots"></div>
      <div class="scramble-letters" id="scrambleLetters"></div>
      <div class="scramble-result" id="scrambleResult"></div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="quiz-btn" onclick="clearAnswer()">CLEAR</button>
        <button class="quiz-btn" onclick="nextScramble()" style="border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,0.05)">SKIP ▸</button>
      </div>
    </div>
  </section>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModal()">✕ CLOSE</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const SCIENTISTS = [
  {
    name: "Linus Torvalds",
    badge: "LINUX KERNEL",
    era: "1991",
    contributions: [
      "Created the Linux kernel",
      "Stated most OS developments happened in the 1960s",
      "Started Linux as a personal project while a student"
    ],
    detail: "Finnish-American software engineer who created the Linux kernel in 1991. He developed it initially as a hobby, but it grew into the backbone of most servers, Android devices, and supercomputers worldwide.",
    color: "#00ff88"
  },
  {
    name: "Fernando J. Corbató",
    badge: "MULTICS / MIT",
    era: "1963",
    contributions: [
      "Leader of Multics development team at MIT",
      "Designed and supervised Multics development",
      "Pioneered time-sharing systems"
    ],
    detail: "American computer scientist who led the Multics project at MIT. Multics (Multiplexed Information and Computing Service) introduced many concepts later used in Unix, including hierarchical file systems and dynamic linking.",
    color: "#ffb300"
  },
  {
    name: "Ken Thompson",
    badge: "UNIX / B LANGUAGE",
    era: "1969",
    contributions: [
      "Co-creator of UNIX at Bell Labs",
      "Developed the first version (UNICS)",
      "Invented the B programming language",
      "Rewrote UNIX in C later",
      "Co-winner of the Turing Award"
    ],
    detail: "American pioneer of computer science. Thompson co-created Unix at Bell Labs with Dennis Ritchie. He also invented the B programming language (predecessor to C), and later co-created Go at Google.",
    color: "#00e5ff"
  },
  {
    name: "Dennis Ritchie",
    badge: "C LANGUAGE / UNIX",
    era: "1972",
    contributions: [
      "Creator of the C programming language",
      "Co-developer of UNIX with Ken Thompson",
      "Made UNIX portable by rewriting it in C",
      "Co-winner of the Turing Award"
    ],
    detail: "Dennis Ritchie created C and co-developed Unix. C became one of the most influential programming languages ever — nearly every modern OS is written in it. He and Thompson received the Turing Award in 1983.",
    color: "#ff6b6b"
  },
  {
    name: "Brian Kernighan",
    badge: "UNIX TOOLS / C BOOK",
    era: "1973",
    contributions: [
      "Contributed to UNIX development",
      "Suggested the name 'UNIX'",
      "Co-authored 'The C Programming Language' with Ritchie",
      "Developed UNIX tools like ditroff"
    ],
    detail: "Canadian computer scientist at Bell Labs who coined the name 'Unix' and co-authored the definitive C programming book with Dennis Ritchie. The book, often called 'K&R C', set the standard for how C was taught.",
    color: "#c77dff"
  },
  {
    name: "Bill Joy",
    badge: "BSD / vi / csh",
    era: "1977",
    contributions: [
      "Developed BSD (Berkeley Software Distribution)",
      "Added features to UNIX, released 1BSD and 2BSD",
      "Created the vi text editor",
      "Created the C shell (csh)"
    ],

const QUIZ_QUESTIONS = [

// ---- PROFILES ----
function renderProfiles() {
  const grid = document.getElementById('profilesGrid');
  grid.innerHTML = SCIENTISTS.map((s,i) => `
    <div class="profile-card" onclick="openModal(${i})" style="animation-delay:${i*0.05}s;animation:slideIn 0.4s ease ${i*0.05}s both">
      <div class="profile-name">${s.name}</div>
      <div class="profile-badge">${s.badge}</div>
      <ul class="profile-contributions">
        ${s.contributions.slice(0,3).map(c=>`<li>${c}</li>`).join('')}
      </ul>
    </div>
  `).join('');
}

function openModal(i) {
  const s = SCIENTISTS[i];
  document.getElementById('modalBody').innerHTML = `
    <h2 style="font-family:Orbitron,monospace;color:${s.color};font-size:20px;margin-bottom:4px">${s.name}</h2>
    <div style="color:var(--dim);font-size:11px;letter-spacing:3px;margin-bottom:16px">${s.badge} · ${s.era}</div>
    <p style="color:var(--dim);font-size:13px;line-height:1.8;margin-bottom:16px">${s.detail}</p>
    <div style="color:var(--dim);font-size:11px;letter-spacing:2px;margin-bottom:8px">KEY CONTRIBUTIONS:</div>
    <ul class="profile-contributions">
      ${s.contributions.map(c=>`<li style="font-size:13px;color:var(--text);margin-bottom:6px">${c}</li>`).join('')}
    </ul>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay') || !e)
    document.getElementById('modalOverlay').classList.remove('open');
}

// ---- TIMELINE ----
function renderTimeline() {
  const c = document.getElementById('timelineContainer');
  c.innerHTML = TIMELINE_EVENTS.map((e,i) => `
    <div class="timeline-item" style="animation-delay:${i*0.1}s">
      <div class="timeline-year">${e.year}</div>
      <div class="timeline-line">
        <div class="timeline-dot" style="animation-delay:${i*0.1}s"></div>
        <div class="timeline-connector"></div>
      </div>
      <div class="timeline-content">
        <div class="timeline-title">${e.title}</div>
        <div class="timeline-desc">${e.desc}</div>
      </div>
    </div>
  `).join('');
}

// ---- FLASHCARDS ----
let flashIdx = 0, flashFlipped = false;
function renderFlash() {
  const s = SCIENTISTS[flashIdx];
  document.getElementById('flashFront').textContent = s.name;
  document.getElementById('flashBack').innerHTML = s.contributions.map(c=>`▸ ${c}`).join('<br>');
  document.getElementById('flashCounter').textContent = `${flashIdx+1} / ${SCIENTISTS.length}`;
  document.getElementById('flashProgress').style.width = `${(flashIdx+1)/SCIENTISTS.length*100}%`;
  const card = document.getElementById('flashcard');
  card.classList.remove('flipped');
  flashFlipped = false;
}
function flipCard() {
  const card = document.getElementById('flashcard');
  flashFlipped = !flashFlipped;
  card.classList.toggle('flipped', flashFlipped);
}
function nextCard() { flashIdx=(flashIdx+1)%SCIENTISTS.length; renderFlash(); }
function prevCard() { flashIdx=(flashIdx-1+SCIENTISTS.length)%SCIENTISTS.length; renderFlash(); }

// ---- QUIZ ----
let quizIdx=0, quizScore=0, quizTimer=20, quizInterval=null, quizAnswered=false;
let quizOrder = [];

function startQuiz() {
  quizOrder = shuffle([...Array(QUIZ_QUESTIONS.length).keys()]);
  quizIdx=0; quizScore=0; quizAnswered=false;
  document.getElementById('quizScore').textContent='0';
  renderQuestion();
}

function renderQuestion() {
  clearInterval(quizInterval);
  quizAnswered=false;
  const idx = quizOrder[quizIdx % quizOrder.length];
  const q = QUIZ_QUESTIONS[idx];
  document.getElementById('quizProgress').textContent = `Question ${quizIdx+1}/12`;

  quizTimer=20;
  document.getElementById('quizTimer').textContent='20';
  quizInterval = setInterval(()=>{
    quizTimer--;
    const el=document.getElementById('quizTimer');
    if(el) el.textContent = quizTimer;
    if(quizTimer===0){clearInterval(quizInterval); if(!quizAnswered)timeOut();}
  },1000);

  const opts = shuffle([...q.opts]);
  document.getElementById('quizArea').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-q-label">QUESTION ${quizIdx+1}</div>
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-options">
        ${opts.map((o,i)=>`<button class="quiz-opt" onclick="answerQuiz('${o.replace(/'/g,"\\'")}', this)">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}
      </div>
      <div id="quizFeedback"></div>
    </div>
    <button class="quiz-btn" id="nextBtn" style="display:none" onclick="nextQuestion()">NEXT QUESTION ▸</button>
  `;
}

function answerQuiz(answer, btn) {
  if(quizAnswered) return;
  quizAnswered=true;
  clearInterval(quizInterval);
  const idx = quizOrder[quizIdx % quizOrder.length];
  const q = QUIZ_QUESTIONS[idx];
  const correct = q.a;
  const allBtns = btn.parentElement.querySelectorAll('.quiz-opt');
  allBtns.forEach(b=>{
    b.disabled=true;
    if(b.textContent.includes(correct)) b.classList.add('correct');
  });
  const fb = document.getElementById('quizFeedback');
  if(answer===correct){
    btn.classList.add('correct');
    quizScore++;
    document.getElementById('quizScore').textContent=quizScore;
    fb.innerHTML=`<div class="quiz-feedback">✓ Correct! ${q.fact}</div>`;
  } else {
    btn.classList.add('wrong');
    fb.innerHTML=`<div class="quiz-feedback wrong-fb">✗ Incorrect. ${q.fact}</div>`;
  }
  document.getElementById('nextBtn').style.display='inline-block';
}

function timeOut(){
  quizAnswered=true;
  const idx = quizOrder[quizIdx % quizOrder.length];
  const q = QUIZ_QUESTIONS[idx];
  const allBtns = document.querySelectorAll('.quiz-opt');
  allBtns.forEach(b=>{b.disabled=true; if(b.textContent.includes(q.a)) b.classList.add('correct');});
  document.getElementById('quizFeedback').innerHTML=`<div class="quiz-feedback wrong-fb">⏱ Time's up! ${q.fact}</div>`;
  document.getElementById('nextBtn').style.display='inline-block';
}

function nextQuestion(){
  quizIdx++;
  if(quizIdx>=12){showResult();return;}
  renderQuestion();
}

function showResult(){
  clearInterval(quizInterval);
  const pct=Math.round(quizScore/12*100);
  let grade,msg,color;
  if(pct>=90){grade='S';msg='SYSTEM ARCHITECT';color='var(--green)';}
  else if(pct>=75){grade='A';msg='KERNEL HACKER';color='var(--cyan)';}
  else if(pct>=60){grade='B';msg='OS DEVELOPER';color='var(--amber)';}
  else if(pct>=40){grade='C';msg='APPRENTICE CODER';color='var(--dim)';}
  else{grade='F';msg='REBOOT REQUIRED';color:'var(--red)';}
  document.getElementById('quizArea').innerHTML=`
    <div class="quiz-result">
      <div class="result-grade" style="color:${color}">${grade}</div>
      <div class="result-msg" style="color:${color}">${msg}</div>
      <div style="color:var(--dim);margin:10px 0 20px">${quizScore}/12 correct (${pct}%)</div>
      <button class="quiz-btn" onclick="startQuiz()">⟳ PLAY AGAIN</button>
    </div>
  `;
}

// ---- MATCH GAME ----
let matchSelected=null, matchPairs=0;
function initMatch(){
  matchPairs=0; matchSelected=null;
  document.getElementById('matchScore').textContent='0';
  document.getElementById('matchMsg').textContent='';
  const pairs = shuffle([...MATCH_PAIRS]).slice(0,8);
  const names = shuffle(pairs.map(p=>p.name));
  const contribs = shuffle(pairs.map(p=>p.contrib));
  document.getElementById('matchLeft').innerHTML = names.map(n=>`
    <div class="match-item" data-type="name" data-val="${n}" onclick="matchClick(this)">${n}</div>
  `).join('');
  document.getElementById('matchRight').innerHTML = contribs.map(c=>`
    <div class="match-item" data-type="contrib" data-val="${c}" onclick="matchClick(this)">${c}</div>
  `).join('');
}

function matchClick(el){
  if(el.classList.contains('matched')) return;
  if(matchSelected===null){
    matchSelected=el; el.classList.add('selected');
  } else {
    if(matchSelected===el){ matchSelected.classList.remove('selected'); matchSelected=null; return; }
    const a=matchSelected, b=el;
    const aName = a.dataset.type==='name'?a.dataset.val:b.dataset.val;
    const aContrib = a.dataset.type==='contrib'?a.dataset.val:b.dataset.val;
    const pair = MATCH_PAIRS.find(p=>p.name===aName && p.contrib===aContrib);
    if(pair){
      a.classList.remove('selected'); a.classList.add('matched');
      b.classList.add('matched');
      matchPairs++;
      document.getElementById('matchScore').textContent=matchPairs;
      document.getElementById('matchMsg').textContent='';
      if(matchPairs===8) setTimeout(()=>{ document.getElementById('matchMsg').innerHTML='<span style="color:var(--green);font-family:Orbitron,monospace">✓ PERFECT MATCH! ALL DONE!</span>'; },200);
    } else {
      a.classList.add('wrong-flash'); b.classList.add('wrong-flash');
      setTimeout(()=>{ a.classList.remove('wrong-flash','selected'); b.classList.remove('wrong-flash'); },500);
      document.getElementById('matchMsg').style.color='var(--red)';
      document.getElementById('matchMsg').textContent='✗ No match — try again';
    }
    matchSelected=null;
  }
}

// ---- SCRAMBLE ----
let scrambleIdx=0, scrambleScore=0, scrambleOrder=[];
let scrambleAnswer=[];

function initScramble(){
  scrambleOrder=shuffle([...Array(SCIENTISTS.length).keys()]);
  scrambleIdx=0; scrambleScore=0;
  document.getElementById('scrambleScore').textContent='0';
  renderScramble();
}

function renderScramble(){
  scrambleAnswer=[];
  const s=SCIENTISTS[scrambleOrder[scrambleIdx%scrambleOrder.length]];
  const name=s.name.toUpperCase();
  const letters=shuffle([...name.replace(/ /g,'')]);
  document.getElementById('scrambleClue').innerHTML=
    `<strong>CLUE:</strong> ${s.contributions[0]}`;
  document.getElementById('scrambleResult').textContent='';
  renderSlots(name);
  renderLetters(letters, name);
}

function renderSlots(name){
  const slots=document.getElementById('answerSlots');
  const words=name.split(' ');
  let idx=0;
  slots.innerHTML=words.map((w,wi)=>`
    ${wi>0?'<div style="width:16px"></div>':''}
    ${[...w].map((_,i)=>`<div class="answer-slot" data-idx="${idx++}" onclick="removeFromSlot(this)"></div>`).join('')}
  `).join('');
}

function renderLetters(letters, name){
  document.getElementById('scrambleLetters').innerHTML=letters.map((l,i)=>`
    <div class="letter-tile" data-letter="${l}" data-i="${i}" onclick="addLetter(this)">${l}</div>
  `).join('');
}

function addLetter(tile){
  if(tile.classList.contains('used')) return;
  tile.classList.add('used');
  const slots=document.querySelectorAll('.answer-slot');
  for(const slot of slots){
    if(!slot.textContent){
      slot.textContent=tile.dataset.letter;
      slot.dataset.tileIdx=tile.dataset.i;
      scrambleAnswer.push({slot,tile});
      checkScramble();
      return;
    }
  }
}

function removeFromSlot(slot){
  if(!slot.textContent) return;
  const ti=slot.dataset.tileIdx;
  const tile=document.querySelector(`.letter-tile[data-i="${ti}"]`);
  if(tile) tile.classList.remove('used');
  slot.textContent=''; slot.dataset.tileIdx='';
  scrambleAnswer=scrambleAnswer.filter(x=>x.slot!==slot);
}

function clearAnswer(){
  scrambleAnswer.forEach(({slot,tile})=>{ slot.textContent=''; slot.dataset.tileIdx=''; tile.classList.remove('used'); });
  scrambleAnswer=[];
}

function checkScramble(){
  const slots=document.querySelectorAll('.answer-slot');
  const allFilled=[...slots].every(s=>s.textContent);
  if(!allFilled) return;
  const s=SCIENTISTS[scrambleOrder[scrambleIdx%scrambleOrder.length]];
  const typed=[...slots].map(s=>s.textContent).join('');
  const expected=s.name.toUpperCase().replace(/ /g,'');
  if(typed===expected){
    scrambleScore++;
    document.getElementById('scrambleScore').textContent=scrambleScore;
    document.getElementById('scrambleResult').innerHTML=`<span style="color:var(--green);font-family:Orbitron,monospace">✓ CORRECT! "${s.name}"</span>`;
    setTimeout(()=>{ scrambleIdx++; renderScramble(); },1500);
  } else {
    document.getElementById('scrambleResult').innerHTML=`<span style="color:var(--red)">✗ Not quite — keep trying</span>`;
    setTimeout(clearAnswer,800);
  }
}

function nextScramble(){ scrambleIdx++; renderScramble(); }

// ---- UTILS ----
function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ---- INIT ----
renderProfiles();
renderTimeline();
renderFlash();
startQuiz();
initMatch();
initScramble();
</script>
